# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "meteo-clima"

[setup]
script = '''
export NVM_DIR="/home/yorch/.nvm"

if [ ! -s "$NVM_DIR/nvm.sh" ]; then
  echo "ERROR: nvm.sh not found at $NVM_DIR/nvm.sh"
  exit 1
fi

. "$NVM_DIR/nvm.sh"

nvm use --lts >/dev/null 2>&1 || {
  echo "ERROR: failed to activate Node LTS via nvm"
  exit 1
}

# Asegurar que el Node activo de nvm quede primero en PATH
export PATH="$(dirname "$(nvm which --lts)"):$PATH"
hash -r

cd /home/yorch/projects/apps/meteo-clima || {
  echo "ERROR: project directory not found"
  exit 1
}

echo "NVM_DIR=$NVM_DIR"
echo "node: $(which node)"
echo "pnpm: $(which pnpm)"

node -v || exit 1
pnpm -v || exit 1
'''
